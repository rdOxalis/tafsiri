name: tafsiri
description: "AI-powered text translation app supporting Mistral, Claude, and ChatGPT backends."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  sqflite: ^2.3.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  http: ^1.2.1
  speech_to_text: ^7.0.0
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.13.0
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9
  sqflite_common_ffi: ^2.3.6
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon_1024.png"
  adaptive_icon_background: "#00897B"
  adaptive_icon_foreground: "assets/icon/icon_1024.png"
  min_sdk_android: 21
