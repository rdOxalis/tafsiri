AntiFeatures:
  NonFreeNet:
    en-US: Connects to third-party AI API services (Mistral, Claude, OpenAI). API
      keys are provided by the user — the app has no built-in credentials.
Categories:
  - Internet
License: MIT
AuthorName: rdOxalis
AuthorWebSite: https://github.com/rdOxalis
WebSite: https://github.com/rdOxalis/tafsiri
SourceCode: https://github.com/rdOxalis/tafsiri
IssueTracker: https://github.com/rdOxalis/tafsiri/issues

AutoName: tafsiri

RepoType: git
Repo: https://github.com/rdOxalis/tafsiri

Builds:
  - versionName: 1.0.5
    versionCode: 5
    commit: ee2b338b1a02d7490bce28e7d2c5cf2f42c16cc5
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release

AutoUpdateMode: Version
UpdateCheckMode: Tags v\d+.\d+.\d+
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.0.5
CurrentVersionCode: 5
