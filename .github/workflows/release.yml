name: Release

on:
  push:
    tags:
      - 'v*'

env:
  flutter-version: '3.41.9'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
      - run: flutter build apk --release
