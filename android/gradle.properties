org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Opt out of the AGP 9 / new Gradle DSL migration. F-Droid's buildserver uses a
# bleeding-edge toolchain (AGP 9 / Gradle 9) that activates the new DSL and
# built-in Kotlin; the old google_mlkit_commons plugin and this project are not
# migrated yet. BOTH flags are required — newDsl alone leaves a kotlin-android
# "extension already registered" failure. See docs/FDROID.md.
android.newDsl=false
android.builtInKotlin=false
